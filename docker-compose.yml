services:
  mongo:
    image: mongo:7
    container_name: doctor-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  elasticsearch: 
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: doctor-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - elk_network
